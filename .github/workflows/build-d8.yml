name: Build d8

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: 'V8 commit hash or version (e.g., 609a85c2a1bd77d6f6905369f4bc4fcf34c5db09). Leave empty for latest.'
        required: false
        default: ''
        type: string
      build_type:
        description: 'Build type: release (with symbols) or debug'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: var77/v8-docker-build:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get V8 commit info
        id: v8_info
        run: |
          set -e
          
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          V8_VERSION="${{ github.event.inputs.v8_version || '' }}"
          
          # Clone depot_tools
          if [ ! -d "depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          export PATH="$PATH:$PWD/depot_tools"
          
          # Create working directory
          mkdir -p build && cd build
          
          # Fetch V8
          fetch v8
          cd v8
          
          # Checkout specific version if specified
          if [ -n "$V8_VERSION" ]; then
            echo "Checking out version: $V8_VERSION"
            git checkout "$V8_VERSION" || {
              echo "Failed to checkout $V8_VERSION, trying as branch..."
              git fetch origin "$V8_VERSION" && git checkout FETCH_HEAD
            }
          fi
          
          # Get commit info
          V8_COMMIT=$(git log -1 --format='%H')
          V8_COMMIT_SHORT=$(git log -1 --format='%h')
          V8_COMMIT_MSG=$(git log -1 --format='%s')
          V8_COMMIT_DATE=$(git log -1 --format='%cd' --date=format:'%Y%m%d')
          
          # Try to get V8 version from BUILD.gn
          V8_VERSION_TAG=$(grep -oP 'v8_major = \K\d+' BUILD.gn 2>/dev/null || echo "")
          if [ -n "$V8_VERSION_TAG" ]; then
            V8_VERSION_FULL=$(grep -oP 'v8_major = \d+\s+v8_minor = \K\d+' BUILD.gn 2>/dev/null || echo "0")
            V8_VERSION_STRING="${V8_VERSION_TAG}.${V8_VERSION_FULL}"
          else
            V8_VERSION_STRING=""
          fi
          
          echo "V8 commit: $V8_COMMIT"
          echo "V8 commit message: $V8_COMMIT_MSG"
          echo "V8 version string: ${V8_VERSION_STRING:-unknown}"
          
          # Generate tag: v8-{commit_short}-{build_type}
          TAG="v8-${V8_COMMIT_SHORT}-${BUILD_TYPE}"
          
          # Generate release name
          if [ -n "$V8_VERSION_STRING" ]; then
            RELEASE_NAME="V8 ${V8_VERSION_STRING} d8 (${BUILD_TYPE}) - ${V8_COMMIT_SHORT}"
          else
            RELEASE_NAME="V8 d8 (${BUILD_TYPE}) - ${V8_COMMIT_SHORT}"
          fi
          
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "V8_COMMIT=$V8_COMMIT" >> $GITHUB_OUTPUT
          echo "V8_COMMIT_SHORT=$V8_COMMIT_SHORT" >> $GITHUB_OUTPUT
          echo "V8_COMMIT_MSG=$V8_COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "V8_COMMIT_DATE=$V8_COMMIT_DATE" >> $GITHUB_OUTPUT
          echo "V8_VERSION_STRING=${V8_VERSION_STRING:-unknown}" >> $GITHUB_OUTPUT
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_OUTPUT
          
          echo "Tag: $TAG"
          echo "Release name: $RELEASE_NAME"
      
      - name: Download and compile V8
        run: |
          set -e
          
          BUILD_TYPE="${{ steps.v8_info.outputs.BUILD_TYPE }}"
          V8_VERSION="${{ github.event.inputs.v8_version || '' }}"
          
          echo "Build type: $BUILD_TYPE"
          echo "V8 version: ${V8_VERSION:-latest}"
          
          # Clone depot_tools
          if [ ! -d "depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          export PATH="$PATH:$PWD/depot_tools"
          
          # Create working directory
          mkdir -p build && cd build
          
          # Fetch V8
          fetch v8
          cd v8
          
          # Checkout specific version if specified
          if [ -n "$V8_VERSION" ]; then
            echo "Checking out version: $V8_VERSION"
            git checkout "$V8_VERSION" || {
              echo "Failed to checkout $V8_VERSION, trying as branch..."
              git fetch origin "$V8_VERSION" && git checkout FETCH_HEAD
            }
          fi
          
          echo "Current V8 commit: $(git log -1 --format='%H %s')"
          
          # Create build configuration based on build type
          if [ "$BUILD_TYPE" = "release" ]; then
            echo "Using Release + Symbols configuration"
            cat > args.gn << 'EOF'
          is_component_build = false
          is_debug = false
          symbol_level = 2
          blink_symbol_level = 2
          v8_symbol_level = 2
          perfetto_force_dcheck = "off"
          dcheck_always_on = false
          v8_enable_backtrace = true
          v8_enable_fast_mksnapshot = true
          v8_enable_slow_dchecks = false
          v8_optimized_debug = false
          v8_enable_disassembler = true
          v8_enable_object_print = true
          v8_enable_verify_heap = true
          enable_cet_shadow_stack = false
          v8_static_library = true
          v8_use_external_startup_data = false
          use_custom_libcxx = false
          treat_warnings_as_errors = false
          EOF
            BUILD_DIR="out.gn/x64.release"
          else
            echo "Using Debug configuration"
            cat > args.gn << 'EOF'
          is_component_build = false
          is_debug = true
          v8_static_library = true
          symbol_level = 2
          v8_enable_sandbox = false
          v8_optimized_debug = false
          v8_enable_gdbjit = true
          v8_enable_backtrace = true
          v8_enable_disassembler = true
          v8_enable_object_print = true
          v8_enable_verify_heap = true
          treat_warnings_as_errors = false
          v8_use_external_startup_data = false
          use_custom_libcxx = false
          EOF
            BUILD_DIR="out.gn/x64.debug"
          fi
          
          # Generate build files
          echo "Generating build files..."
          gn gen "$BUILD_DIR"
          
          # Build d8
          echo "Building d8..."
          ninja -C "$BUILD_DIR" d8
          
          echo "Build completed!"
          ls -lh "$BUILD_DIR/d8"
          
          # Copy d8 to root for release
          cp "$BUILD_DIR/d8" ./d8
          cp "$BUILD_DIR"/*.so ./ 2>/dev/null || true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v8_info.outputs.TAG }}
          name: ${{ steps.v8_info.outputs.RELEASE_NAME }}
          body: |
            ## V8 d8 Build
            
            **V8 Version:** ${{ steps.v8_info.outputs.V8_VERSION_STRING }}
            **Build Type:** ${{ steps.v8_info.outputs.BUILD_TYPE }}
            **V8 Commit:** [`${{ steps.v8_info.outputs.V8_COMMIT_SHORT }}`](https://chromium.googlesource.com/v8/v8/+/${{ steps.v8_info.outputs.V8_COMMIT }})
            **Commit Message:** ${{ steps.v8_info.outputs.V8_COMMIT_MSG }}
            **Build Date:** ${{ github.event.repository.updated_at }}
            
            ### Build Configuration
            
            ```gn
            ${{ steps.v8_info.outputs.BUILD_TYPE == 'release' && 'is_debug = false
            symbol_level = 2
            v8_optimized_debug = false
            v8_enable_backtrace = true' || 'is_debug = true
            symbol_level = 2
            v8_enable_sandbox = false
            v8_enable_gdbjit = true' }}
            ```
            
            ### Usage
            
            ```bash
            # Download and make executable
            chmod +x d8
            
            # Run with GDB
            gdb ./d8
            
            # Run with V8 flags
            ./d8 --allow-natives-syntax --shell test.js
            ```
            
            ### Source
            
            V8 source: https://chromium.googlesource.com/v8/v8/+/${{ steps.v8_info.outputs.V8_COMMIT }}
          files: |
            build/v8/d8
            build/v8/*.so
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: d8-${{ steps.v8_info.outputs.TAG }}
          path: |
            build/v8/d8
            build/v8/*.so
          retention-days: 90